name: Sync Telegram Channel
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Telegram Posts
        run: node scripts/sync-telegram.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add announcements.html
          git diff --quiet && git diff --staged --quiet || git commit -m "بروزرسانی خودکار اطلاعیه‌ها از تلگرام"
          git push
